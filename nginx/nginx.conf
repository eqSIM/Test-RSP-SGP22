worker_processes 1;
error_log /home/jhubuntu/pq-rsp-benchmarks/nginx/runtime/logs/error.log;
pid /home/jhubuntu/pq-rsp-benchmarks/nginx/runtime/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /home/jhubuntu/pq-rsp-benchmarks/nginx/runtime/logs/access.log;

    upstream smdpp {
        server 127.0.0.1:8000;
    }

    server {
        listen 8443 ssl;
        server_name testsmdpplus1.example.com;

        ssl_certificate /home/jhubuntu/pq-rsp-benchmarks/pysim/smdpp-data/certs/DPtls/CERT_S_SM_DP_TLS_NIST.pem;
        ssl_certificate_key /home/jhubuntu/pq-rsp-benchmarks/pysim/smdpp-data/certs/DPtls/SK_S_SM_DP_TLS_NIST.pem;
        ssl_protocols TLSv1.3;

        location / {
            proxy_pass http://smdpp/;
            proxy_read_timeout 600s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # PQ-TLS (ML-DSA-44 server cert; TLS 1.3 negotiates ML-KEM hybrid e.g. X25519MLKEM768)
    # Certs: scripts/gen_pq_certs.sh  —  nginx must be built with OpenSSL 3.5+ (scripts/build_pq_nginx.sh)
    server {
        listen 8444 ssl;
        server_name testsmdpplus1.example.com;

        ssl_certificate /home/jhubuntu/pq-rsp-benchmarks/nginx/ssl_pq/dptls.pem;
        ssl_certificate_key /home/jhubuntu/pq-rsp-benchmarks/nginx/ssl_pq/dptls.key;
        ssl_protocols TLSv1.3;

        location / {
            proxy_pass http://smdpp/;
            proxy_read_timeout 600s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
